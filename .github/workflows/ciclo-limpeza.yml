name: Limpar Checkboxes (Manual e Agendado 2x2 - A, B e C)

on:
  # É aqui que definimos a entrada manual
  workflow_dispatch:
    inputs:
      turma_manual:
        description: 'Qual turma limpar manualmente? (A, B ou C)'
        required: true
        default: 'A'
  schedule:
    - cron: '0 4 * * *'  # 1h da manhã BRT (Limpeza A e B)
    - cron: '0 19 * * *' # 16h da tarde BRT (Limpeza C)

jobs:
  limpar-dados-firebase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          path: .

      - name: Verificar Dia de Trabalho (Ciclo 2x2 - A, B e C)
        id: verificar-dia
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_TURMA: ${{ github.event.inputs.turma_manual }}
        run: |
          # --- CASO 1: EXECUÇÃO MANUAL ---
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "É um TESTE MANUAL para a TURMA: $INPUT_TURMA"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "target_team=$INPUT_TURMA" >> $GITHUB_OUTPUT
            exit 0
          fi

          # --- CASO 2: EXECUÇÃO AGENDADA (Verifica Ciclos) ---
          echo "É uma execução AGENDADA. Verificando horários e ciclos..."
          CURRENT_SECONDS=$(date +%s)
          # 1h BRT = 04h UTC (Manhã/Madrugada)
          # 16h BRT = 19h UTC (Tarde)
          CURRENT_HOUR_UTC=$(date +%H)
          echo "Hora atual (UTC): $CURRENT_HOUR_UTC"

          # ====================================================
          # BLOCO MADRUGADA (1h BRT / 04h UTC) -> TURMAS A e B
          # ====================================================
          if [ "$CURRENT_HOUR_UTC" -eq 04 ]; then
            echo ">>> Horário de limpeza das Turmas A e B (1h BRT) <<<"
          
            # >>> VERIFICAÇÃO TURMA A <<<
            ANCHOR_A="2026-01-08"
            ANCHOR_SECONDS_A=$(date -d "$ANCHOR_A" +%s)
            DIFF_DAYS_A=$(((CURRENT_SECONDS - ANCHOR_SECONDS_A) / 86400))
            CYCLE_DAY_A=$(( (DIFF_DAYS_A % 4 + 4) % 4 ))

            if [[ $CYCLE_DAY_A -eq 0 || $CYCLE_DAY_A -eq 1 ]]; then
              echo "Hoje é dia de trabalho da TURMA A."
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "target_team=A" >> $GITHUB_OUTPUT
              exit 0
            fi

            # >>> VERIFICAÇÃO TURMA B <<<
            ANCHOR_B="2025-11-07"
            ANCHOR_SECONDS_B=$(date -d "$ANCHOR_B" +%s)
            DIFF_DAYS_B=$(((CURRENT_SECONDS - ANCHOR_SECONDS_B) / 86400))
            CYCLE_DAY_B=$(( (DIFF_DAYS_B % 4 + 4) % 4 ))

            if [[ $CYCLE_DAY_B -eq 0 || $CYCLE_DAY_B -eq 1 ]]; then
              echo "Hoje é dia de trabalho da TURMA B."
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "target_team=B" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # ====================================================
          # BLOCO TARDE (16h BRT / 19h UTC) -> TURMA C
          # ====================================================
          if [ "$CURRENT_HOUR_UTC" -eq 19 ]; then
             echo ">>> Horário de limpeza da Turma C (16h BRT) <<<"

             # >>> VERIFICAÇÃO TURMA C <<<
             ANCHOR_C="2026-01-16"
             ANCHOR_SECONDS_C=$(date -d "$ANCHOR_C" +%s)
             DIFF_DAYS_C=$(((CURRENT_SECONDS - ANCHOR_SECONDS_C) / 86400))
             CYCLE_DAY_C=$(( (DIFF_DAYS_C % 4 + 4) % 4 ))

             if [[ $CYCLE_DAY_C -eq 0 || $CYCLE_DAY_C -eq 1 ]]; then
               echo "Hoje é dia de trabalho da TURMA C."
               echo "should_run=true" >> $GITHUB_OUTPUT
               echo "target_team=C" >> $GITHUB_OUTPUT
               exit 0
             fi
          fi

          # >>> NENHUMA TURMA <<<
          echo "Hoje nenhuma das turmas configuradas para este horário está no ciclo de trabalho."
          echo "should_run=false" >> $GITHUB_OUTPUT

      - name: Instalar dependências
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: npm install

      - name: Rodar script de limpeza
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: node scripts/limpar-firebase.cjs 
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Passamos a turma identificada (A, B ou C) para o Node
          TARGET_TEAM: ${{ steps.verificar-dia.outputs.target_team }}
