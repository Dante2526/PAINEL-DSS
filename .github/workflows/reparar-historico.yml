name: Reparo Retroativo do Histórico DSS (Manual)

on:
  workflow_dispatch:
    inputs:
      confirmacao:
        description: 'Digite "SIM" para confirmar a execução do reparo real'
        required: true
        default: 'NAO'

jobs:
  executar-reparo:
    runs-on: ubuntu-latest
    
    if: github.event.inputs.confirmacao == 'SIM'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: npm install

      - name: Rodar script de reparo
        run: node scripts/reparar-historico.cjs
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
