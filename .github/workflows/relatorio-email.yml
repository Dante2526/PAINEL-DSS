name: Enviar Relatório por E-mail (Agendado 2x2 - A, B, C e D)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      turma_manual:
        description: 'Gerar relatório de qual turma? (Ex: A, A_CG, B, B_CG, C, CCG, D)'
        required: true
        default: 'A'
#  schedule:
#    # 13:12 UTC = 10:12 BRT (Manhã - Foge do pico das 10:00)
#    - cron: '12 13 * * *'
#    # 00:07 UTC = 21:07 BRT (Noite - Foge do pico das 21:00)
#    - cron: '7 0 * * *'

jobs:
  enviar-relatorio-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verificar Dia de Trabalho (Ciclo 2x2 - A, B, C e D)
        id: verificar-dia
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_TURMA: ${{ github.event.inputs.turma_manual }}
        run: |
          # --- CASO 1: EXECUÇÃO MANUAL ---
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "::notice ::Modo Manual Detectado. Turma Selecionada: $INPUT_TURMA"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "target_team=$INPUT_TURMA" >> $GITHUB_OUTPUT
            exit 0
          fi

          # --- CASO 2: EXECUÇÃO AGENDADA ---
          echo "Verificando agendamento automático..."
          
          CURRENT_SECONDS=$(date +%s)
          # Pega hora UTC.
          CURRENT_HOUR_UTC=$(date +%H)
          CURRENT_HOUR_UTC=$((10#$CURRENT_HOUR_UTC)) # Remove zero à esquerda
          
          echo "Hora atual (UTC): $CURRENT_HOUR_UTC"

          # ====================================================================
          # BLOCO MANHÃ (10h BRT / 13h UTC) -> A e B
          # Janela: Aceita de 13 a 18 UTC (10h até 15h BRT)
          # ====================================================================
          if [[ "$CURRENT_HOUR_UTC" -ge 13 && "$CURRENT_HOUR_UTC" -le 18 ]]; then
            echo ">>> Horário identificado: MANHÃ (Turmas A/B)"
            
            # Lógica Turma A
            ANCHOR_A="2026-01-08"
            SEC_A=$(date -d "$ANCHOR_A" +%s)
            DIFF_A=$(((CURRENT_SECONDS - SEC_A) / 86400))
            CYCLE_A=$(( (DIFF_A % 4 + 4) % 4 ))
            
            if [[ $CYCLE_A -eq 0 || $CYCLE_A -eq 1 ]]; then
               echo "should_run=true" >> $GITHUB_OUTPUT
               echo "target_team=A A_CG ESTAGIO" >> $GITHUB_OUTPUT
               exit 0
            fi

            # Lógica Turma B
            ANCHOR_B="2025-11-07"
            SEC_B=$(date -d "$ANCHOR_B" +%s)
            DIFF_B=$(((CURRENT_SECONDS - SEC_B) / 86400))
            CYCLE_B=$(( (DIFF_B % 4 + 4) % 4 ))
            
            if [[ $CYCLE_B -eq 0 || $CYCLE_B -eq 1 ]]; then
               echo "should_run=true" >> $GITHUB_OUTPUT
               echo "target_team=B B_CG ESTAGIO" >> $GITHUB_OUTPUT
               exit 0
            fi
          fi

          # ====================================================================
          # BLOCO NOITE (21h BRT / 00h UTC) -> Turmas C e D
          # Janela: Aceita de 00 a 05 UTC (21h até 02h BRT)
          # ====================================================================
          if [[ "$CURRENT_HOUR_UTC" -ge 0 && "$CURRENT_HOUR_UTC" -le 5 ]]; then
             echo ">>> Horário identificado: NOITE (Turmas C ou D)"
             
             # CORREÇÃO DO EFEITO CINDERELA: Subtrai 12 horas (43200 segundos)
             # Isso garante que a madrugada seja calculada como o dia anterior.
             SECONDS_VIRTUAL=$((CURRENT_SECONDS - 43200))
             
             # >>> VERIFICAÇÃO TURMA C <<<
             ANCHOR_C="2026-01-16"
             SEC_C=$(date -d "$ANCHOR_C" +%s)
             DIFF_C=$(((SECONDS_VIRTUAL - SEC_C) / 86400))
             CYCLE_C=$(( (DIFF_C % 4 + 4) % 4 ))

             if [[ $CYCLE_C -eq 0 || $CYCLE_C -eq 1 ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
                echo "target_team=C C_CG" >> $GITHUB_OUTPUT
                exit 0
             fi

             # >>> VERIFICAÇÃO TURMA D <<<
             ANCHOR_D="2026-01-26"
             SEC_D=$(date -d "$ANCHOR_D" +%s)
             DIFF_D=$(((SECONDS_VIRTUAL - SEC_D) / 86400))
             CYCLE_D=$(( (DIFF_D % 4 + 4) % 4 ))

             if [[ $CYCLE_D -eq 0 || $CYCLE_D -eq 1 ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
                echo "target_team=D" >> $GITHUB_OUTPUT
                exit 0
             fi
          fi

          echo "Nenhuma turma no ciclo de hoje/horário."
          echo "should_run=false" >> $GITHUB_OUTPUT

      - name: Instalar dependências
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: npm ci --omit=dev

      - name: Rodar script de envio de e-mail
        if: steps.verificar-dia.outputs.should_run == 'true'
        # Padrão Ouro: output de steps isolado em variável de ambiente,
        # evitando injeção de comandos via interpolação direta no bloco 'run'.
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          TARGET_TEAMS: ${{ steps.verificar-dia.outputs.target_team }}
        run: |
          for team in $TARGET_TEAMS; do
            echo "Enviando relatório para a equipe: $team"
            TARGET_TEAM=$team node scripts/enviar-relatorio.cjs
          done
