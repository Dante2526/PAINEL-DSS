name: Enviar Relatório por E-mail (Agendado 2x2 - A, B, C e D)

on:
  workflow_dispatch:
    inputs:
      turma_manual:
        description: 'Gerar relatório de qual turma? (A, B, C ou D)'
        required: true
        default: 'A'
  schedule:
    # 13:12 UTC = 10:12 BRT (Manhã - Foge do pico das 10:00)
    - cron: '12 13 * * *'
    # 00:07 UTC = 21:07 BRT (Noite - Foge do pico das 21:00)
    - cron: '7 0 * * *'

jobs:
  enviar-relatorio-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          path: .

      - name: Verificar Dia de Trabalho (Ciclo 2x2 - A, B, C e D)
        id: verificar-dia
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_TURMA: ${{ github.event.inputs.turma_manual }}
        run: |
          # --- CASO 1: EXECUÇÃO MANUAL ---
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "::notice ::Modo Manual Detectado. Turma Selecionada: $INPUT_TURMA"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "target_team=$INPUT_TURMA" >> $GITHUB_OUTPUT
            exit 0
          fi

          # --- CASO 2: EXECUÇÃO AGENDADA ---
          echo "Verificando agendamento automático..."
          
          CURRENT_SECONDS=$(date +%s)
          # Pega hora UTC.
          # 21h BRT = 00h UTC
          # 22h BRT = 01h UTC
          # 23h BRT = 02h UTC
          CURRENT_HOUR_UTC=$(date +%H)
          CURRENT_HOUR_UTC=$((10#$CURRENT_HOUR_UTC)) # Remove zero à esquerda
          
          echo "Hora atual (UTC): $CURRENT_HOUR_UTC"

          # ====================================================================
          # BLOCO MANHÃ (10h BRT / 13h UTC) -> A e B
          # Janela: Aceita 13, 14 ou 15 UTC (10h às 12h BRT)
          # ====================================================================
          if [[ "$CURRENT_HOUR_UTC" -eq 13 || "$CURRENT_HOUR_UTC" -eq 14 || "$CURRENT_HOUR_UTC" -eq 15 ]]; then
            echo ">>> Horário identificado: MANHÃ (Turmas A/B)"
            
            # Lógica Turma A
            ANCHOR_A="2026-01-08"
            SEC_A=$(date -d "$ANCHOR_A" +%s)
            DIFF_A=$(((CURRENT_SECONDS - SEC_A) / 86400))
            CYCLE_A=$(( (DIFF_A % 4 + 4) % 4 ))
            
            if [[ $CYCLE_A -eq 0 || $CYCLE_A -eq 1 ]]; then
               echo "should_run=true" >> $GITHUB_OUTPUT
               echo "target_team=A" >> $GITHUB_OUTPUT
               exit 0
            fi

            # Lógica Turma B
            ANCHOR_B="2025-11-07"
            SEC_B=$(date -d "$ANCHOR_B" +%s)
            DIFF_B=$(((CURRENT_SECONDS - SEC_B) / 86400))
            CYCLE_B=$(( (DIFF_B % 4 + 4) % 4 ))
            
            if [[ $CYCLE_B -eq 0 || $CYCLE_B -eq 1 ]]; then
               echo "should_run=true" >> $GITHUB_OUTPUT
               echo "target_team=B" >> $GITHUB_OUTPUT
               exit 0
            fi
          fi

          # ====================================================================
          # BLOCO NOITE (21h BRT / 00h UTC) -> Turmas C e D
          # Janela: Aceita 00, 01 ou 02 UTC (21h, 22h ou 23h BRT)
          # ====================================================================
          if [[ "$CURRENT_HOUR_UTC" -eq 0 || "$CURRENT_HOUR_UTC" -eq 1 || "$CURRENT_HOUR_UTC" -eq 2 ]]; then
             echo ">>> Horário identificado: NOITE (Turmas C ou D)"
             
             # Ajuste de Fuso (-3h) para manter a data correta do plantão.
             SECONDS_BRT=$((CURRENT_SECONDS - 10800))
             
             # >>> VERIFICAÇÃO TURMA C <<<
             ANCHOR_C="2026-01-16"
             SEC_C=$(date -d "$ANCHOR_C" +%s)
             DIFF_C=$(((SECONDS_BRT - SEC_C) / 86400))
             CYCLE_C=$(( (DIFF_C % 4 + 4) % 4 ))

             if [[ $CYCLE_C -eq 0 || $CYCLE_C -eq 1 ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
                echo "target_team=C" >> $GITHUB_OUTPUT
                exit 0
             fi

             # >>> VERIFICAÇÃO TURMA D <<<
             ANCHOR_D="2026-01-26"
             SEC_D=$(date -d "$ANCHOR_D" +%s)
             DIFF_D=$(((SECONDS_BRT - SEC_D) / 86400))
             CYCLE_D=$(( (DIFF_D % 4 + 4) % 4 ))

             if [[ $CYCLE_D -eq 0 || $CYCLE_D -eq 1 ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
                echo "target_team=D" >> $GITHUB_OUTPUT
                exit 0
             fi
          fi

          echo "Nenhuma turma no ciclo de hoje/horário (UTC: $CURRENT_HOUR_UTC)."
          echo "should_run=false" >> $GITHUB_OUTPUT

      - name: Instalar dependências
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: npm install

      - name: Rodar script de envio de e-mail
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: node scripts/enviar-relatorio.cjs 
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TARGET_TEAM: ${{ steps.verificar-dia.outputs.target_team }}
