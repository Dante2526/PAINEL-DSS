name: Enviar Relatório por E-mail (Agendado 2x2 - A e B)

on:
  workflow_dispatch:
    inputs:
      turma_manual:
        description: 'Gerar relatório de qual turma? (A ou B)'
        required: true
        default: 'A'
  schedule:
    - cron: '0 13 * * *' # 10h da manhã BRT

jobs:
  enviar-relatorio-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          path: .

      - name: Verificar Dia de Trabalho (Ciclo 2x2 - A e B)
        id: verificar-dia
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_TURMA: ${{ github.event.inputs.turma_manual }}
        run: |
          # --- CASO 1: EXECUÇÃO MANUAL ---
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "É um TESTE MANUAL para a TURMA: $INPUT_TURMA"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "target_team=$INPUT_TURMA" >> $GITHUB_OUTPUT
            exit 0
          fi

          # --- CASO 2: EXECUÇÃO AGENDADA (Verifica Ciclos) ---
          echo "É uma execução AGENDADA. Verificando ciclos..."
          CURRENT_SECONDS=$(date +%s)

          # >>> VERIFICAÇÃO TURMA A <<<
          ANCHOR_A="2026-01-08"
          ANCHOR_SECONDS_A=$(date -d "$ANCHOR_A" +%s)
          DIFF_DAYS_A=$(((CURRENT_SECONDS - ANCHOR_SECONDS_A) / 86400))
          CYCLE_DAY_A=$(( (DIFF_DAYS_A % 4 + 4) % 4 ))

          if [[ $CYCLE_DAY_A -eq 0 || $CYCLE_DAY_A -eq 1 ]]; then
            echo "Hoje é dia de trabalho da TURMA A."
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "target_team=A" >> $GITHUB_OUTPUT
            exit 0
          fi

          # >>> VERIFICAÇÃO TURMA B <<<
          ANCHOR_B="2025-11-07"
          ANCHOR_SECONDS_B=$(date -d "$ANCHOR_B" +%s)
          DIFF_DAYS_B=$(((CURRENT_SECONDS - ANCHOR_SECONDS_B) / 86400))
          CYCLE_DAY_B=$(( (DIFF_DAYS_B % 4 + 4) % 4 ))

          if [[ $CYCLE_DAY_B -eq 0 || $CYCLE_DAY_B -eq 1 ]]; then
            echo "Hoje é dia de trabalho da TURMA B."
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "target_team=B" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Hoje nenhuma das turmas está no ciclo de envio."
          echo "should_run=false" >> $GITHUB_OUTPUT

      - name: Instalar dependências
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: npm install

      - name: Rodar script de envio de e-mail
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: node scripts/enviar-relatorio.cjs 
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TARGET_TEAM: ${{ steps.verificar-dia.outputs.target_team }}