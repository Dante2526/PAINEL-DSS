name: Enviar Relatório por E-mail (Agendado 2x2 - A, B e C)

on:
  workflow_dispatch:
    inputs:
      turma_manual:
        description: 'Gerar relatório de qual turma? (A, B ou C)'
        required: true
        default: 'A'
  schedule:
    - cron: '0 13 * * *' # 10h da manhã BRT (A e B)
    - cron: '0 1 * * *'  # 22h da noite BRT (C)

jobs:
  enviar-relatorio-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          path: .

      - name: Verificar Dia de Trabalho (Ciclo 2x2 - A, B e C)
        id: verificar-dia
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_TURMA: ${{ github.event.inputs.turma_manual }}
        run: |
          # --- CASO 1: EXECUÇÃO MANUAL ---
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "::notice ::Modo Manual Detectado. Turma Selecionada: $INPUT_TURMA"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "target_team=$INPUT_TURMA" >> $GITHUB_OUTPUT
            exit 0
          fi

          # --- CASO 2: EXECUÇÃO AGENDADA ---
          echo "Verificando agendamento automático..."
          
          CURRENT_SECONDS=$(date +%s)
          # Pega hora UTC. 22h BRT pode ser 01h ou 02h UTC dependendo de delay.
          CURRENT_HOUR_UTC=$(date +%H)
          CURRENT_HOUR_UTC=$((10#$CURRENT_HOUR_UTC)) # Remove zero à esquerda
          
          echo "Hora atual (UTC): $CURRENT_HOUR_UTC"

          # BLOCO MANHÃ (10h BRT / 13h-14h UTC) -> A e B
          if [[ "$CURRENT_HOUR_UTC" -eq 13 || "$CURRENT_HOUR_UTC" -eq 14 ]]; then
            # Lógica Turma A
            ANCHOR_A="2026-01-08"
            SEC_A=$(date -d "$ANCHOR_A" +%s)
            DIFF_A=$(((CURRENT_SECONDS - SEC_A) / 86400))
            CYCLE_A=$(( (DIFF_A % 4 + 4) % 4 ))
            
            if [[ $CYCLE_A -eq 0 || $CYCLE_A -eq 1 ]]; then
               echo "should_run=true" >> $GITHUB_OUTPUT
               echo "target_team=A" >> $GITHUB_OUTPUT
               exit 0
            fi

            # Lógica Turma B
            ANCHOR_B="2025-11-07"
            SEC_B=$(date -d "$ANCHOR_B" +%s)
            DIFF_B=$(((CURRENT_SECONDS - SEC_B) / 86400))
            CYCLE_B=$(( (DIFF_B % 4 + 4) % 4 ))
            
            if [[ $CYCLE_B -eq 0 || $CYCLE_B -eq 1 ]]; then
               echo "should_run=true" >> $GITHUB_OUTPUT
               echo "target_team=B" >> $GITHUB_OUTPUT
               exit 0
            fi
          fi

          # BLOCO NOITE (22h BRT / 01h-02h UTC) -> Turma C
          if [[ "$CURRENT_HOUR_UTC" -eq 1 || "$CURRENT_HOUR_UTC" -eq 2 ]]; then
             # Ajuste de Fuso (-3h) para manter data 16/01
             SECONDS_BRT=$((CURRENT_SECONDS - 10800))
             
             ANCHOR_C="2026-01-16"
             SEC_C=$(date -d "$ANCHOR_C" +%s)
             DIFF_C=$(((SECONDS_BRT - SEC_C) / 86400))
             CYCLE_C=$(( (DIFF_C % 4 + 4) % 4 ))

             if [[ $CYCLE_C -eq 0 || $CYCLE_C -eq 1 ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
                echo "target_team=C" >> $GITHUB_OUTPUT
                exit 0
             fi
          fi

          echo "Nenhuma turma no ciclo de hoje/horário."
          echo "should_run=false" >> $GITHUB_OUTPUT

      - name: Instalar dependências
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: npm install

      - name: Rodar script de envio de e-mail
        if: steps.verificar-dia.outputs.should_run == 'true'
        run: node scripts/enviar-relatorio.cjs 
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Esta linha abaixo é a mais importante para o manual funcionar:
          TARGET_TEAM: ${{ steps.verificar-dia.outputs.target_team }}
