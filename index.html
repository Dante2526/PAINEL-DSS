<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0080ff" />
    
    <title>PAINEL DSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary': '#0080ff',
              'primary-light': '#4da3ff',
              'primary-dark': '#0066cc',
              'success': '#5ec269',
              'danger': '#ff5252',
              'neutral': '#8b95a1',
              'warning': '#ffc107',
              'orange': '#ff9800',
              'light-bg': '#f5f7fa',
              'light-bg-secondary': '#e8ecf1',
              'light-card': '#ffffff',
              'light-text': '#1a1a1a',
              'light-text-secondary': '#666666',
              'dark-bg': '#1A202C',
              'dark-bg-secondary': '#2D3748',
              'dark-card': '#2D3748',
              'dark-text': '#f7fafc',
              'dark-text-secondary': '#a0aec0',
            },
          },
        },
      }
    </script>
    <style>
      /* Loader styles for initial load (before React) */
      .app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f5f7fa; /* light-bg */
        z-index: 99999;
        transition: background-color 0.3s;
      }
      
      @media (prefers-color-scheme: dark) {
        .app-loader {
          background-color: #1A202C; /* dark-bg */
          color: #f7fafc;
        }
      }

      .loader-shield {
        width: 80px;
        height: 80px;
        animation: pulse-blue 2s infinite;
      }

      .loader-text {
        margin-top: 20px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.1em;
        opacity: 0.7;
        text-transform: uppercase;
        color: #0080ff;
      }

      @keyframes pulse-blue {
        0% { transform: scale(0.95); filter: drop-shadow(0 0 0 rgba(0, 128, 255, 0.4)); }
        70% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(0, 128, 255, 0)); }
        100% { transform: scale(0.95); filter: drop-shadow(0 0 0 rgba(0, 128, 255, 0)); }
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/",
    "@emailjs/browser": "https://aistudiocdn.com/@emailjs/browser@^4.4.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.7",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.2",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.1"
  }
}
</script>
</head>
  <body>
    <div id="root">
      <!-- Initial Loading Screen HTML -->
      <div class="app-loader">
        <svg class="loader-shield" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="loaderShieldGradient" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4da3ff" />
              <stop offset="100%" stop-color="#0066cc" />
            </linearGradient>
          </defs>
          <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" fill="url(#loaderShieldGradient)" stroke="#0056b3" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 3.5L18.5 6V12C18.5 16.5 12 20.5 12 20.5V3.5Z" fill="white" fill-opacity="0.3" style="mix-blend-mode:overlay"/>
        </svg>
        <div class="loader-text">Carregando Sistema...</div>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
